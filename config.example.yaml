# CodeGen configuration example
# Copy this to ~/.config/codegen/config.json (JSON format) or use CLI flags

# Provider selection: ollama | openai | anthropic | groq | gemini
provider: ollama
model: llama3.2

# Ollama (local)
# base_url: http://localhost:11434

# OpenAI
# provider: openai
# model: gpt-4o
# api_key: sk-...   (or set OPENAI_API_KEY env var)

# Anthropic
# provider: anthropic
# model: claude-sonnet-4-6
# api_key: sk-ant-...   (or set ANTHROPIC_API_KEY env var)

# Groq (free tier available)
# provider: groq
# model: llama-3.3-70b-versatile
# api_key: gsk_...   (or set GROQ_API_KEY env var)

# Gemini
# provider: gemini
# model: gemini-2.0-flash
# api_key: AIza...   (or set GEMINI_API_KEY env var)

# Custom OpenAI-compatible endpoint (LM Studio, vLLM, etc.)
# provider: openai
# base_url: http://localhost:1234/v1
# api_key: lm-studio
# model: your-model-name
